bots: []
# Example bot:
# - name: my_bot
#   enabled: true
#   token: ""
#   mode: polling                # polling or webhook
#   webhook_url: ""              # required if mode=webhook, your A0 base URL e.g. https://yourdomain.com
#   webhook_secret: ""           # optional shared secret for webhook verification
#   allowed_users: []            # Telegram user IDs or @usernames. Empty = allow all.
#   allowed_chats: []            # Telegram chat IDs. Empty = allow all.
#   notify_chat_id: ""           # Optional fixed destination for telegram_send. Blank = auto-send to every chat that has messaged the bot.
#   notify_default: false        # Make this the default bot for telegram_send when no bot is specified.
#   group_mode: mention          # mention (respond when @mentioned or replied to) | all (respond to every message) | off (ignore groups)
#   welcome_enabled: false       # Send a greeting when someone joins the group
#   welcome_message: ""          # Welcome template. Use {name} for the new member's name.
#   user_projects: {}            # Map Telegram user_id to project name, e.g. { "123456": "my_project" }
#   default_project: ""          # Fallback project if user not in user_projects
#   attachment_max_age_hours: 0  # Hours to keep downloaded attachments. 0 = keep forever.
#   max_file_size_mb: 20         # Max file size for attachments in MB
#   a0_timeout: 300              # Request timeout in seconds for A0 API
#   notify_messages: false       # Show a WebUI notification for each incoming Telegram message
#   enrich_media: true           # Transcribe voice/audio + extract video frames & document text before sending to the agent (reuses the built-in Whisper STT plugin)
#   video_frame_interval_s: 5    # Sample one video frame per this many seconds. More = denser sampling. Total frames are capped by the chat model's max_embeds.
#   queue_messages: true         # When the agent is busy, queue new messages and run them in order instead of interrupting it. Send /stop to cancel the current task and jump ahead.
#   stage_feedback: false        # Opt-in: send staged "still working" messages while a long turn runs (typing-indicator-style, but with text). Stage 3 checks liveness and only reports a timeout if the turn is actually stuck — the agent is never killed on duration.
#   stage1_seconds: 30           # Stage 1 threshold — "Working on the task provided..."
#   stage2_seconds: 300          # Stage 2 threshold (5 min) — "Task given requires more time, please wait..."
#   stage3_seconds: 1800         # Stage 3 threshold (30 min) — "Task is taking longer than usual, check back later..." then a liveness check.
#   agent_instructions: ""       # Extra instructions for the agent in Telegram chats
